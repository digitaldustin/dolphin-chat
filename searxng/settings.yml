general:
  debug: false
  instance_name: "Dolphin Chat"
  contact_url: "mailto:admin@example.com"
  enable_metrics: true
  metrics_password: "changeme"

server:
  bind_address: "0.0.0.0"
  port: 8080
  secret_key: "changeme-generate-with-openssl-rand-hex-32"
  limiter: true
  max_requests: 100
  timeout: 30

search:
  safe_search: 1
  autocomplete: "google"
  default_lang: "en"
  formats:
    - html
    - json

redis:
  enabled: false

categories:
  general:
    - google
    - bing
    - duckduckgo
    - brave
    - startpage
  images:
    - google_images
    - bing_images
    - duckduckgo_images
  videos:
    - google_videos
    - bing_videos
  news:
    - google_news
    - bing_news
  science:
    - google_scholar
    - semantic_scholar
  map:
    - openstreetmap
  music:
    - soundcloud
  files:
    - google
    - bing
  social:
    - reddit
    - twitter
  it:
    - github
    - gitlab
    - stackoverflow

engines:
  - name: google
    engine: google
    shortcut: g
    categories: [general, images, videos, news, files]
    disabled: false
    timeout: 5.0
    send_accept_language_header: true
  - name: bing
    engine: bing
    shortcut: b
    categories: [general, images, videos, news, files]
    disabled: false
    timeout: 5.0
  - name: duckduckgo
    engine: duckduckgo
    shortcut: d
    categories: [general, images, videos]
    disabled: false
    timeout: 5.0
  - name: brave
    engine: brave
    shortcut: br
    categories: [general]
    disabled: false
    timeout: 5.0
