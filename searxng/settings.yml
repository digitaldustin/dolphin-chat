# SearXNG configuration for Odyssey
# Docs: https://docs.searxng.org/admin/settings/index.html

use_default_settings: true

general:
  instance_name: "Odyssey SearXNG"
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: false

server:
  # IMPORTANT: change this to a long random string for production
  secret_key: "change-me-to-a-random-string"
  limiter: false
  image_proxy: false
  http_protocol_version: "1.1"
  method: "GET"
  default_http_headers:
    # Allow the Odyssey browser app to query SearXNG cross-origin.
    Access-Control-Allow-Origin: "*"
    Access-Control-Allow-Methods: "GET, POST, OPTIONS"
    Access-Control-Allow-Headers: "Content-Type"

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "auto"
  formats:
    - html
    - json

ui:
  static_use_hash: true
  default_theme: simple
  infinite_scroll: false
